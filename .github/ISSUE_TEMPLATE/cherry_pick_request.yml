name: Cherry-pick request
description: Request cherry-picks into release branches
title: '[Cherry-pick]: '
labels:
  - cherry-pick:request
body:
  - type: input
    id: source_pr
    attributes:
      label: Source PR
      description: 'A merged PR into main. Examples: #879, 879, or a same-repository PR URL.'
      placeholder: '#879'
    validations:
      required: true

  - type: checkboxes
    id: target_branches
    attributes:
      label: Target release branches
      description: Select one or more release branches.
      options:
        - label: release/3.7
        - label: release/3.6
        - label: release/3.5
        - label: release/3.4
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this cherry-pick needed?
      description: Explain the user impact, regression, or release requirement.
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
