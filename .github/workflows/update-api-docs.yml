name: Update API docs

# Weekly (and on-demand) regeneration of the lynx-stack-derived API reference
# docs, opened as a draft PR for review. Runs entirely in lynx-website and does
# not touch the lynx-stack release pipeline or require cross-repo secrets.

on:
  schedule:
    - cron: '0 18 * * 0' # Weekly, Sunday 18:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  update:
    name: Regenerate API docs from lynx-stack
    if: github.repository == 'lynx-family/lynx-website'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Serialize runs — both schedule and workflow_dispatch write to the same
    # bot/update-api-docs branch, so overlapping runs would race.
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout lynx-website
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # peter-evans/create-pull-request handles its own auth; don't leave
          # GITHUB_TOKEN persisted in git config for later steps to reuse.
          persist-credentials: false

      - name: Checkout lynx-stack
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lynx-family/lynx-stack
          ref: main
          path: .lynx-stack
          persist-credentials: false

      - name: Setup Rust
        # lynx-stack's build graph compiles wasm crates (e.g. react-transform,
        # web-core). Match lynx-stack's rust-toolchain.toml (it lives in
        # .lynx-stack/, so it isn't auto-detected from the repo root here).
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1
        with:
          toolchain: '1.92.0'
          target: wasm32-unknown-unknown,wasm32-wasip1
          cache: false

      - name: Setup PNPM
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          # Satisfies both repos (lynx-stack engines: ^22 || ^24).
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate API docs
        run: bash scripts/update-api-docs.sh .lynx-stack

      - name: Validate build
        id: build
        continue-on-error: true
        run: pnpm run build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        # The action runs its own `git commit`, which triggers the husky
        # pre-commit hook (lint-staged → cspell/prettier). On auto-generated
        # docs that hook can fail on harmless unknown words and abort the run.
        # HUSKY=0 skips the hook for this commit — equivalent to `git commit -n`.
        env:
          HUSKY: '0'
        with:
          branch: bot/update-api-docs
          delete-branch: true
          draft: true
          add-paths: |
            docs/en/api
            docs/zh/api
          commit-message: 'docs(api): sync API reference from lynx-stack main'
          title: 'docs(api): sync API reference from lynx-stack main'
          body: |
            Automated weekly regeneration of the lynx-stack-derived API docs.

            **Build validation:** `${{ steps.build.outcome }}` (GITHUB_TOKEN PRs don't trigger CI, so the build is run inside this job).

            Covered:
            - `rspeedy/*` — API Extractor + API Documenter, from lynx-stack `main`.
            - `reactlynx-testing-library`, `lynx-testing-environment` — TypeDoc.

            **Reviewer checklist**
            - [ ] Reconcile `docs/{en,zh}/api/_meta.json` sidebar nav if API members were added/removed (not automated).
            - [ ] `docs/{en,zh}/api/react` is **not** auto-regenerated (bespoke: custom intro + projectDocuments whose sources don't ship). Update manually if its API changed.
            - [ ] If **Build validation** above is `failure`, check the workflow run logs.

            Generated by `.github/workflows/update-api-docs.yml` /
            `scripts/update-api-docs.sh`.
