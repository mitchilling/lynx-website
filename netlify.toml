[build]
  command = "NODE_OPTIONS=--max-old-space-size=3072 RSPRESS_SSG_WORKER_THREAD_COUNT=1 pnpm exec rspress build"
  publish = "doc_build"

[context.branch-deploy.environment]
  RSPRESS_LIGHTWEIGHT_BUILD = "true"

[context.deploy-preview.environment]
  RSPRESS_LIGHTWEIGHT_BUILD = "true"

[[headers]]
  for = "/*"
  [headers.values]
    access-control-allow-origin = "https://www.unpkg.com"

# Tutorials moved from /guide/start/tutorial-* to top-level /learn/*. The
# /next/* rewrite at the bottom doesn't chain into these — direct hits to
# the /next/ form need their own rules. The trailing splat catches the bare
# URL plus the .html and .md variants in one rule.
[[redirects]]
  from = "/guide/start/tutorial-gallery*"
  to = "/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/tutorial-gallery*"
  to = "/zh/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/guide/start/tutorial-product-detail*"
  to = "/learn/product-detail:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh/guide/start/tutorial-product-detail*"
  to = "/zh/learn/product-detail:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/guide/start/tutorial-gallery*"
  to = "/next/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/zh/guide/start/tutorial-gallery*"
  to = "/next/zh/learn/gallery:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/guide/start/tutorial-product-detail*"
  to = "/next/learn/product-detail:splat"
  status = 301
  force = true

[[redirects]]
  from = "/next/zh/guide/start/tutorial-product-detail*"
  to = "/next/zh/learn/product-detail:splat"
  status = 301
  force = true

# Serve everything under /next/ from the site root.
[[redirects]]
  from = "/next/*"
  to = "https://main--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.7/*"
  to = "https://release-3-7--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.6/*"
  to = "https://release-3-6--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.5/*"
  to = "https://release-3-5--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.4/*"
  to = "https://release-3-4--lynx-doc.netlify.app/:splat"
  status = 200

[[redirects]]
  from = "/3.8/*"
  to = "/:splat"
  status = 200
